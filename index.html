<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── PWA / App identity ─────────────────────────────────────────── -->
    <title>Fixsense — AI Sales Call Intelligence</title>
    <meta name="description" content="Record, analyze, and improve every sales conversation with AI-powered real-time insights." />
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fixsense" />
    <link rel="apple-touch-icon" href="/fixsense_icon_logo (2).png" />

    <!-- Android / Chrome -->
    <meta name="theme-color" content="#7c3aed" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Fixsense — AI Sales Intelligence" />
    <meta property="og:description" content="Every sales call analyzed. Every insight surfaced. Close more deals." />
    <meta property="og:image" content="/fixsense_icon_logo (2).png" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/fixsense_icon_logo (2).png" />

    <!-- Safe area support for notched phones -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --sar: env(safe-area-inset-right);
      }
      body {
        padding-top: var(--sat);
        padding-bottom: var(--sab);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js', { scope: '/' })
            .then((reg) => {
              console.log('[PWA] SW registered:', reg.scope);
            })
            .catch((err) => {
              console.warn('[PWA] SW registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
