<script>
const SUPA_URL = 'https://dkvtufanmaiclmsnpyae.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrdnR1ZmFubWFpY2xtc25weWFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMjAxMzAsImV4cCI6MjA4Nzg5NjEzMH0.YF-IQCoUFicNTIi1IBHb99sN08U3WJAkIVs9vDDHumQ';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY, { auth: { storage: window.localStorage, persistSession: true, autoRefreshToken: true }});

let state = {
  view: 'login',
  adminUser: null,
  session: null,
  users: [],
  stats: null,
  loading: false,
  filter: 'all',
  search: '',
  page: 0,
  pageSize: 15,
  modal: null,
  toast: null,
  auditLog: []
};

function fmt(state, updater) { return Object.assign({}, state, updater); }

function showToast(msg, type='success') {
  state.toast = { msg, type };
  render();
  setTimeout(() => { state.toast = null; render(); }, 3200);
}

async function checkAdmin(session) {
  const { data } = await sb.rpc('is_admin', { p_user_id: session.user.id });
  return data === true;
}

async function loadData() {
  state.loading = true; render();
  try {
    const [usersRes, statsRes] = await Promise.all([
      sb.rpc('admin_get_all_users'),
      sb.rpc('admin_get_stats')
    ]);
    if (usersRes.data) state.users = usersRes.data;
    if (statsRes.data) state.stats = statsRes.data;
  } catch(e) {}
  state.loading = false; render();
}

async function loadAuditLog() {
  const { data } = await sb.from('admin_audit_log').select('*').order('created_at', { ascending: false }).limit(50);
  state.auditLog = data || [];
  render();
}

async function doLogin(email, password) {
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) return error.message;
  const ok = await checkAdmin(data.session);
  if (!ok) {
    await sb.auth.signOut();
    return 'Access denied — not an authorized admin account.';
  }
  await sb.rpc('admin_update_last_login', { p_user_id: data.session.user.id });
  state.session = data.session;
  state.adminUser = data.session.user;
  state.view = 'dashboard';
  await loadData();
  return null;
}

async function doDeleteUser(userId, email) {
  await sb.rpc('admin_delete_user', { p_user_id: userId });
  await sb.rpc('admin_log_action', {
    p_admin_email: state.adminUser.email,
    p_action: 'delete_user',
    p_target_id: userId,
    p_target_email: email,
    p_details: JSON.stringify({ deleted_by: state.adminUser.email })
  });
  state.users = state.users.filter(u => u.user_id !== userId);
  showToast('User deleted successfully');
}

async function doChangePlan(userId, email, plan) {
  await sb.rpc('admin_update_user_plan', { p_user_id: userId, p_plan: plan });
  await sb.rpc('admin_log_action', {
    p_admin_email: state.adminUser.email,
    p_action: 'change_plan',
    p_target_id: userId,
    p_target_email: email,
    p_details: JSON.stringify({ new_plan: plan })
  });
  state.users = state.users.map(u => u.user_id === userId ? {...u, plan_type: plan} : u);
  showToast('Plan updated to ' + plan);
}

async function doChangeLimit(userId, email, limit) {
  const n = parseInt(limit);
  if (isNaN(n)) return;
  await sb.rpc('admin_update_user_limit', { p_user_id: userId, p_calls_limit: n });
  await sb.rpc('admin_log_action', {
    p_admin_email: state.adminUser.email,
    p_action: 'update_limit',
    p_target_id: userId,
    p_target_email: email,
    p_details: JSON.stringify({ calls_limit: n })
  });
  state.users = state.users.map(u => u.user_id === userId ? {...u, calls_limit: n} : u);
  showToast('Usage limit updated');
}

function planBadge(plan) {
  const cls = {'free':'badge-free','starter':'badge-starter','growth':'badge-growth','scale':'badge-scale'}[plan] || 'badge-free';
  return `<span class="plan-badge ${cls}">${plan||'free'}</span>`;
}
function planColor(plan) {
  return {'free':'#6b7280','starter':'#60a5fa','growth':'#0ef5d4','scale':'#c4b5fd'}[plan] || '#6b7280';
}
function fmtMoney(kobo) {
  if (!kobo || kobo === 0) return '<span class="money money-zero">—</span>';
  const ngn = kobo / 100;
  return `<span class="money">₦${ngn.toLocaleString()}</span>`;
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}
function usageBar(used, limit) {
  if (!limit || limit <= 0) return '';
  const pct = Math.min((used / limit) * 100, 100);
  const col = pct > 80 ? '#ef4444' : pct > 60 ? '#f59e0b' : '#0ef5d4';
  return `<span class="usage-bar"><span class="usage-bar-fill" style="width:${pct}%;background:${col};"></span></span>`;
}

function filteredUsers() {
  let u = state.users;
  if (state.filter !== 'all') u = u.filter(x => x.plan_type === state.filter);
  if (state.search) {
    const s = state.search.toLowerCase();
    u = u.filter(x => (x.email||'').toLowerCase().includes(s) || (x.full_name||'').toLowerCase().includes(s));
  }
  return u;
}

function groupByTeam(users) {
  const teams = {};
  const solo = [];
  users.forEach(u => {
    if (u.team_id) {
      const key = u.team_id;
      if (!teams[key]) teams[key] = { team_name: u.team_name, members: [], plan: u.plan_type };
      teams[key].members.push(u);
    } else {
      solo.push(u);
    }
  });
  return { teams, solo };
}

        <div class="sidebar">
          <div class="nav-item ${state.view==='dashboard'?'active':''}" data-nav="dashboard">
            <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
            Overview
          </div>
          <div class="nav-item ${state.view==='users'?'active':''}" data-nav="users">
            <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="5" r="3"/><path d="M1 14c0-3 2-4.5 5-4.5s5 1.5 5 4.5"/><path d="M12 7c1.5 0 3 .8 3 3" stroke-linecap="round"/><circle cx="13" cy="4" r="2"/></svg>
            Users
          </div>
          <div class="nav-item ${state.view==='revenue'?'active':''}" data-nav="revenue">
            <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v12M5 5.5C5 4 6.5 3 8 3s3 1 3 2.5c0 2-3 2.5-3 4.5C8 11.5 9 13 10 13" stroke-linecap="round"/></svg>
            Revenue
          </div>
          <div class="nav-sep"></div>
          <div class="nav-item ${state.view==='audit'?'active':''}" data-nav="audit">
            <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h8M2 12h6" stroke-linecap="round"/></svg>
            Audit Log
          </div>
        </div>
        <div class="main" id="main-content">
          ${renderMainContent(s, planCounts, total, revenue, totalRev)}
        </div>
      </div>
    </div>
    ${renderModal()}
    ${state.toast ? `<div class="toast ${state.toast.type}">${state.toast.msg}</div>` : ''}`;

  document.getElementById('logout-btn').onclick = async () => {
    await sb.auth.signOut(); state.view = 'login'; state.adminUser = null; state.session = null; render();
  };
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.onclick = () => {
      state.view = el.dataset.nav;
      if (state.view === 'audit') loadAuditLog();
      render();
    };
  });
  attachTableEvents();
  attachModalEvents();
}

function renderMainContent(s, planCounts, total, revenue, totalRev) {
  if (state.view === 'dashboard') return renderOverview(s, planCounts, total, revenue, totalRev);
  if (state.view === 'users') return renderUsers();
  if (state.view === 'revenue') return renderRevenue(planCounts, revenue, s);
  if (state.view === 'audit') return renderAudit();
  return '';
}

function renderOverview(s, planCounts, total, revenue, totalRev) {
  return `
    <div class="page-header">
      <div>
        <div class="page-title">Platform Overview</div>
        <div class="page-sub">Real-time metrics for Fixsense</div>
      </div>
      <button class="refresh-btn" id="refresh-btn">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 2.5A5 5 0 1 0 10.5 8" stroke-linecap="round"/><path d="M11 1v2.5H8.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Refresh
      </button>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Users</div>
        <div class="stat-value stat-cyan">${s.total_users||0}</div>
        <div class="stat-sub">+${s.new_users_week||0} this week · +${s.new_users_today||0} today</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Subscriptions</div>
        <div class="stat-value stat-green">${s.active_subs||0}</div>
        <div class="stat-sub">${Math.round(((s.active_subs||0)/(s.total_users||1))*100)}% conversion rate</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">MRR (est.)</div>
        <div class="stat-value stat-amber">₦${((totalRev||0)/100).toLocaleString()}</div>
        <div class="stat-sub">from active subs this period</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Calls</div>
        <div class="stat-value">${s.total_calls||0}</div>
        <div class="stat-sub">across ${s.total_teams||0} teams</div>
      </div>
    </div>
    <div class="section-title">Users by plan</div>
    <div class="plan-grid">
      ${['free','starter','growth','scale'].map(plan => {
        const cnt = planCounts[plan];
        const pct = Math.round((cnt/total)*100);
        const color = planColor(plan);
        const prices = {free:'$0/mo',starter:'$18/mo',growth:'$60/mo',scale:'$120/mo'};
        return `<div class="plan-card ${plan==='growth'?'plan-growth':''}">
          <div class="plan-name">${plan.charAt(0).toUpperCase()+plan.slice(1)}</div>
          <div class="plan-count" style="color:${color}">${cnt}</div>
          <div class="plan-price">${prices[plan]} · ${pct}% of users</div>
          <div class="plan-bar"><div class="plan-bar-fill" style="width:${pct}%;background:${color};"></div></div>
        </div>`;
      }).join('')}
    </div>
    <div class="section-row">
      <div class="section-half">
        <div class="section-title">Recent activity</div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>User</th><th>Plan</th><th>Joined</th></tr></thead>
            <tbody>
              ${state.users.slice(0,6).map(u => `<tr>
                <td><div class="user-name">${u.full_name||'—'}</div><div class="user-email">${u.email||''}</div></td>
                <td>${planBadge(u.plan_type)}</td>
                <td>${fmtDate(u.created_at)}</td>
              </tr>`).join('')||'<tr><td colspan="3" class="empty-state">No users yet</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
      <div class="section-half">
        <div class="section-title">Teams on platform</div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>Team</th><th>Members</th><th>Plan</th></tr></thead>
            <tbody>
              ${(() => {
                const { teams } = groupByTeam(state.users);
                const rows = Object.values(teams).slice(0,6);
                if (!rows.length) return '<tr><td colspan="3" class="empty-state">No teams yet</td></tr>';
                return rows.map(t => `<tr>
                  <td>${t.team_name||'Unnamed team'}</td>
                  <td>${t.members.length}</td>
                  <td>${planBadge(t.plan)}</td>
                </tr>`).join('');
              })()}

        </div>
      </div>

}

function renderUsers() {
  const filtered = filteredUsers();
  const start = state.page * state.pageSize;
  const paged = filtered.slice(start, start + state.pageSize);
  const total = filtered.length;
  const totalPages = Math.ceil(total / state.pageSize);

  return `
    <div class="page-header">
      <div>
        <div class="page-title">User Management</div>
        <div class="page-sub">${total} users · manage plans, limits, and accounts</div>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-header">
        <input class="search-input" id="search-input" value="${state.search}" placeholder="Search by name or email..."/>
        <div class="filter-row">
          ${['all','free','starter','growth','scale'].map(f =>
            `<button class="filter-btn ${state.filter===f?'active':''}" data-filter="${f}">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`
          ).join('')}
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table class="data-table" style="min-width:800px;">
          <thead><tr>
            <th>User</th><th>Plan</th><th>Team</th><th>Subscription</th><th>Usage</th><th>Revenue</th><th>Joined</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${paged.length ? paged.map(u => {
              const usedPct = u.calls_limit > 0 ? Math.round((u.calls_used/u.calls_limit)*100) : 0;
              return `<tr>
                <td>
                  <div class="user-name">${u.full_name||'—'}</div>
                  <div class="user-email">${u.email||''}</div>
                </td>
                <td>${planBadge(u.plan_type)}</td>
                <td>${u.team_name ? `<span class="team-chip"><svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="4" cy="4" r="2.5"/><path d="M1 10c0-2 1.5-3 3-3s3 1 3 3"/><circle cx="9" cy="4" r="1.5"/><path d="M9 7c1 0 2 .5 2 2"/></svg>${u.team_name}</span>` : '<span style="color:var(--hint);font-size:11px;">solo</span>'}</td>
                <td>
                  <span class="status-dot">
                    <span class="dot ${u.subscription_status==='active'?'dot-green':u.subscription_status?'dot-amber':'dot-gray'}"></span>
                    ${u.subscription_status||'none'}
                  </span>
                </td>
                <td>
                  <span style="font-size:11px;color:var(--muted);">${u.calls_used||0}/${u.calls_limit||5}</span>
                  ${usageBar(u.calls_used||0, u.calls_limit||5)}
                </td>
                <td>${fmtMoney(u.amount_kobo)}</td>
                <td style="font-size:11px;color:var(--muted);">${fmtDate(u.created_at)}</td>
                <td>
                  <button class="action-btn primary" data-action="plan" data-id="${u.user_id}" data-email="${u.email}" data-plan="${u.plan_type}">Plan</button>
                  <button class="action-btn primary" data-action="limit" data-id="${u.user_id}" data-email="${u.email}" data-limit="${u.calls_limit}">Limit</button>
                  <button class="action-btn danger" data-action="delete" data-id="${u.user_id}" data-email="${u.email}">Delete</button>
                </td>
              </tr>`;
            }).join('') : `<tr><td colspan="8" class="empty-state">No users found</td></tr>`}
          </tbody>
        </table>
      </div>
      ${totalPages > 1 ? `<div class="pager">
        <span>${start+1}–${Math.min(start+state.pageSize, total)} of ${total}</span>
        <button class="pager-btn" id="prev-page" ${state.page===0?'disabled':''}>← Prev</button>
        <button class="pager-btn" id="next-page" ${state.page>=totalPages-1?'disabled':''}>Next →</button>
      </div>` : ''}
    </div>`;
}

function renderRevenue(planCounts, revenue, s) {
  const revenueRows = [
    { plan:'Free', count: planCounts.free, price: 0, mrr: 0, color: '#6b7280' },
    { plan:'Starter', count: planCounts.starter, price: 18, mrr: planCounts.starter * 27000, color: '#60a5fa' },
    { plan:'Growth', count: planCounts.growth, price: 60, mrr: planCounts.growth * 90000, color: '#0ef5d4' },
    { plan:'Scale', count: planCounts.scale, price: 120, mrr: planCounts.scale * 180000, color: '#c4b5fd' },
  ];
  const totalMRR = revenueRows.reduce((a, b) => a + b.mrr, 0);

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Revenue Dashboard</div>
        <div class="page-sub">Estimated MRR based on active plan distribution</div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total MRR (est.)</div>
        <div class="big-number stat-cyan">₦${Math.round(totalMRR/100).toLocaleString()}</div>
        <div class="stat-sub">≈ $${Math.round(totalMRR/150000).toLocaleString()}/mo at ₦1,500/$</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Paying Users</div>
        <div class="big-number stat-green">${(planCounts.starter||0)+(planCounts.growth||0)+(planCounts.scale||0)}</div>
        <div class="stat-sub">${s.active_subs||0} active Paystack subs</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Growth Plan MRR</div>
        <div class="big-number stat-amber">₦${Math.round((planCounts.growth||0)*900).toLocaleString()}</div>
        <div class="stat-sub">${planCounts.growth||0} users × ₦90,000</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ARPU (paying)</div>
        <div class="big-number">₦${(() => {
          const paying = (planCounts.starter||0)+(planCounts.growth||0)+(planCounts.scale||0);
          return paying > 0 ? Math.round((totalMRR/100)/paying).toLocaleString() : '0';
        })()}</div>
        <div class="stat-sub">avg. revenue per paying user</div>
      </div>
    </div>
    <div class="section-title">Revenue by plan</div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>Plan</th><th>Users</th><th>Unit Price</th><th>MRR (NGN)</th><th>MRR (USD)</th><th>% of Revenue</th></tr></thead>
        <tbody>
          ${revenueRows.map(r => {
            const pct = totalMRR > 0 ? Math.round((r.mrr/totalMRR)*100) : 0;
            return `<tr>
              <td>${planBadge(r.plan.toLowerCase())}</td>
              <td>${r.count}</td>
              <td style="color:var(--muted);">${r.price===0?'Free':'$'+r.price+'/mo'}</td>
              <td><strong>${r.mrr>0?'₦'+Math.round(r.mrr/100).toLocaleString():'—'}</strong></td>
              <td style="color:var(--hint);">${r.mrr>0?'$'+Math.round(r.mrr/150000):'—'}</td>
              <td>
                <div style="display:flex;align-items:center;gap:8px;">
                  <span class="usage-bar" style="width:100px;"><span class="usage-bar-fill" style="width:${pct}%;background:${r.color};"></span></span>
                  <span style="font-size:11px;color:var(--muted);">${pct}%</span>
                </div>
              </td>
            </tr>`;
          }).join('')}
          <tr style="font-weight:500;">
            <td colspan="3" style="color:var(--muted);">Total</td>
            <td>₦${Math.round(totalMRR/100).toLocaleString()}</td>
            <td style="color:var(--hint);">$${Math.round(totalMRR/150000)}</td>
            <td>100%</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="section-title" style="margin-top:20px;">Paying users breakdown</div>
    <div class="table-wrap">
      <div style="overflow-x:auto;">
        <table class="data-table" style="min-width:600px;">
          <thead><tr><th>User</th><th>Plan</th><th>Sub Status</th><th>Monthly (NGN)</th><th>Team</th><th>Since</th></tr></thead>
          <tbody>
            ${state.users.filter(u => u.plan_type !== 'free' && u.amount_kobo > 0).map(u => `<tr>
              <td><div class="user-name">${u.full_name||'—'}</div><div class="user-email">${u.email||''}</div></td>
              <td>${planBadge(u.plan_type)}</td>
              <td><span class="status-dot"><span class="dot ${u.subscription_status==='active'?'dot-green':'dot-amber'}"></span>${u.subscription_status||'—'}</span></td>
              <td>${fmtMoney(u.amount_kobo)}</td>
              <td>${u.team_name||'<span style="color:var(--hint);">solo</span>'}</td>
              <td style="font-size:11px;color:var(--muted);">${fmtDate(u.subscription_created_at)}</td>
            </tr>`).join('') || '<tr><td colspan="6" class="empty-state">No paying users yet</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>`;
}

function renderAudit() {
  return `
    <div class="page-header">
      <div>
        <div class="page-title">Admin Audit Log</div>
        <div class="page-sub">All admin actions are logged here</div>
      </div>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>Action</th><th>Admin</th><th>Target</th><th>Details</th><th>When</th></tr></thead>
        <tbody>
          ${state.auditLog.length ? state.auditLog.map(a => `<tr class="audit-row">
            <td><code style="font-size:10px;background:var(--surface2);padding:2px 6px;border-radius:3px;">${a.action||''}</code></td>
            <td style="color:var(--muted);">${a.admin_email||''}</td>
            <td style="color:var(--hint);font-size:10px;">${a.target_email||a.target_user_id||'—'}</td>
            <td style="color:var(--hint);font-size:10px;">${a.details ? JSON.stringify(a.details).slice(0,60) : '—'}</td>
            <td style="color:var(--hint);">${fmtDate(a.created_at)}</td>
          </tr>`).join('') : '<tr><td colspan="5" class="empty-state">No audit log entries yet</td></tr>'}
        </tbody>
      </table>
    </div>`;
}

function renderModal() {
  if (!state.modal) return '';
  const m = state.modal;
  if (m.type === 'delete') {
    return `<div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <h3>Delete user account</h3>
        <p>Permanently remove <strong>${m.email}</strong> from Fixsense? This deletes their profile, calls, and subscription data. This cannot be undone.</p>
        <div class="modal-btns">
          <button class="btn-cancel" id="modal-cancel">Cancel</button>
          <button class="btn-confirm btn-danger" id="modal-confirm">Delete user</button>
        </div>
      </div>
    </div>`;
  }
  if (m.type === 'plan') {
    return `<div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <h3>Change plan</h3>
        <p>Update plan for <strong>${m.email}</strong></p>
        <select class="modal-select" id="plan-select">
          ${['free','starter','growth','scale'].map(p => `<option value="${p}" ${m.currentPlan===p?'selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('')}
        </select>
        <div class="modal-btns">
          <button class="btn-cancel" id="modal-cancel">Cancel</button>
          <button class="btn-confirm btn-primary" id="modal-confirm">Update plan</button>
        </div>
      </div>
    </div>`;
  }
  if (m.type === 'limit') {
    return `<div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <h3>Update usage limit</h3>
        <p>Set the monthly call limit for <strong>${m.email}</strong></p>
        <input class="modal-input" id="limit-input" type="number" value="${m.currentLimit||5}" min="0" max="9999"/>
        <div class="modal-btns">
          <button class="btn-cancel" id="modal-cancel">Cancel</button>
          <button class="btn-confirm btn-primary" id="modal-confirm">Update limit</button>
        </div>
      </div>
    </div>`;
  }
  return '';
}

function attachTableEvents() {
  const searchEl = document.getElementById('search-input');
  if (searchEl) {
    searchEl.oninput = e => { state.search = e.target.value; state.page = 0; render(); };
  }
  document.querySelectorAll('[data-filter]').forEach(el => {
    el.onclick = () => { state.filter = el.dataset.filter; state.page = 0; render(); };
  });
  document.querySelectorAll('[data-action="delete"]').forEach(el => {
    el.onclick = () => { state.modal = { type:'delete', id: el.dataset.id, email: el.dataset.email }; render(); attachModalEvents(); };
  });
  document.querySelectorAll('[data-action="plan"]').forEach(el => {
    el.onclick = () => { state.modal = { type:'plan', id: el.dataset.id, email: el.dataset.email, currentPlan: el.dataset.plan }; render(); attachModalEvents(); };
  });
  document.querySelectorAll('[data-action="limit"]').forEach(el => {
    el.onclick = () => { state.modal = { type:'limit', id: el.dataset.id, email: el.dataset.email, currentLimit: el.dataset.limit }; render(); attachModalEvents(); };
  });
  const prev = document.getElementById('prev-page');
  const next = document.getElementById('next-page');
  if (prev) prev.onclick = () => { state.page = Math.max(0, state.page-1); render(); };
  if (next) next.onclick = () => { state.page++; render(); };
  const ref = document.getElementById('refresh-btn');
  if (ref) ref.onclick = loadData;
}

function attachModalEvents() {
  const cancel = document.getElementById('modal-cancel');
  const confirm = document.getElementById('modal-confirm');
  const overlay = document.getElementById('modal-overlay');
  if (cancel) cancel.onclick = () => { state.modal = null; render(); };
  if (overlay) overlay.onclick = e => { if(e.target===overlay) { state.modal = null; render(); } };
  if (confirm && state.modal) {
    confirm.onclick = async () => {
      const m = state.modal;
      state.modal = null;
      if (m.type === 'delete') {
        await doDeleteUser(m.id, m.email);
      } else if (m.type === 'plan') {
        const plan = document.getElementById('plan-select')?.value || m.currentPlan;
        await doChangePlan(m.id, m.email, plan);
      } else if (m.type === 'limit') {
        const lim = document.getElementById('limit-input')?.value;
        await doChangeLimit(m.id, m.email, lim);
      }
      render();
    };
  }
}

function render() {
  if (state.view === 'login') { renderLogin(); return; }
  renderDashboard();
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const ok = await checkAdmin(session);
    if (ok) {
      state.session = session;
      state.adminUser = session.user;
      state.view = 'dashboard';
      await loadData();
      return;
    }
  }
  state.view = 'login';
  render();
}

init();
</script>
