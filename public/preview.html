<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveMeeting Preview</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0c13;
  color: #fff;
  min-height: 100vh;
}

/* LAYOUT ROOT */
.meeting-workspace {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* TOP NAV */
.top-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  background: rgba(13,15,24,0.98);
  flex-wrap: wrap;
}

.nav-left, .nav-center, .nav-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.meeting-title { font-size: 13px; }
.type-badge {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 6px;
  background: rgba(99,102,241,0.12);
}

/* MAIN */
.main {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* LEFT */
.sidebar-left {
  width: 170px;
  background: rgba(9,11,18,0.85);
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
}

/* CENTER */
.center {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 10px;
  gap: 10px;
  overflow: hidden;
}

/* RIGHT */
.sidebar-right {
  width: 240px;
  background: rgba(9,11,18,0.85);
  border-left: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* VIDEO */
.video-main {
  flex: 2;
  border-radius: 14px;
  background: #111420;
  position: relative;
  min-height: 180px;
}

.video-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

/* CONTROL BAR */
.control-bar {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  padding: 10px;
  background: rgba(13,15,24,0.95);
  border-radius: 14px;
  flex-wrap: wrap;
}

/* BUTTONS */
.ctrl-btn {
  padding: 8px 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.07);
  color: #fff;
  font-size: 11px;
}

/* =========================
   RESPONSIVE BREAKPOINTS
   ========================= */

/* TABLET */
@media (max-width: 1024px) {
  .sidebar-left { width: 140px; }
  .sidebar-right { width: 200px; }
  .video-grid { grid-template-columns: repeat(2, 1fr); }
}

/* MOBILE */
@media (max-width: 768px) {

  .main {
    flex-direction: column;
  }

  .sidebar-left,
  .sidebar-right {
    width: 100%;
    flex-direction: row;
    overflow-x: auto;
    border: none;
  }

  .center {
    padding: 8px;
  }

  .video-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .control-bar {
    flex-direction: column;
  }
}

/* SMALL PHONE */
@media (max-width: 480px) {

  .top-nav {
    flex-direction: column;
    align-items: flex-start;
  }

  .nav-center,
  .nav-right {
    width: 100%;
    justify-content: space-between;
  }

  .video-grid {
    grid-template-columns: 1fr;
  }

  .video-main {
    min-height: 200px;
  }

  .control-bar {
    gap: 8px;
  }

  .ctrl-btn {
    width: 100%;
  }
}

</style>
</head>

<body>

<div class="meeting-workspace">

  <!-- TOP NAV -->
  <div class="top-nav">
    <div class="nav-left">
      <strong>LIVE</strong>
      <span class="meeting-title">Discovery Call with Acme Corp</span>
      <span class="type-badge">Discovery</span>
    </div>

    <div class="nav-center">
      <span>⏱ 23:41</span>
      <span>126 / 300 mins</span>
    </div>

    <div class="nav-right">
      <span>SJ MC +2</span>
      <span>JO</span>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="sidebar-left">
      <p style="padding:10px;">People / Chat / Notes</p>
    </div>

    <div class="center">

      <div class="video-main"></div>

      <div class="video-grid">
        <div style="background:#1a1d2a;border-radius:10px;"></div>
        <div style="background:#1a1d2a;border-radius:10px;"></div>
        <div style="background:#1a1d2a;border-radius:10px;"></div>
      </div>

      <div class="control-bar">
        <button class="ctrl-btn">Mic</button>
        <button class="ctrl-btn">Camera</button>
        <button class="ctrl-btn">Share</button>
        <button class="ctrl-btn">Chat</button>
        <button class="ctrl-btn" style="background:#dc2626;">End</button>
      </div>

    </div>

    <div class="sidebar-right">
      <p style="padding:10px;">AI Panel</p>
    </div>

  </div>

</div>

</body>
</html>
